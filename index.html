<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alter Atelier — Scent Journey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    body {
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
      overflow: hidden;
    }
    .landing-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 4.5rem;
      font-weight: 300;
      margin-bottom: 24px;
      letter-spacing: 0.05em;
      opacity: 0;
      animation: fadeIn 2s ease forwards 0.5s;
    }
    .landing-subtitle {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      color: var(--muted);
      margin-bottom: 70px;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeIn 2s ease forwards 1s;
    }
    .btn-start {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 18px 48px;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      cursor: none; /* for custom cursor */
      transition: all 0.4s ease;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 12px;
      opacity: 0;
      animation: fadeIn 2s ease forwards 1.5s;
    }
    .btn-start:hover {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }
    .btn-start svg {
      width: 14px;
      height: 14px;
      transition: transform 0.3s ease;
    }
    .btn-start:hover svg {
      transform: translateX(4px);
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- Custom Cursor -->
  <div class="cursor-dot" id="cursor-dot"></div>
  <div class="cursor-ring" id="cursor-ring"></div>

  <h1 class="landing-title">Alter Atelier</h1>
  <div class="landing-subtitle">Discover Your Olfactory Identity</div>
  
  <a href="preferences.html" class="btn-start" id="start-btn">
    BEGIN CONSULTATION
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </a>

  <script>
    // Cursor handling
    const dot = document.getElementById('cursor-dot');
    const ring = document.getElementById('cursor-ring');
    let mx=0, my=0, rx=0, ry=0;
    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      dot.style.transform = `translate(${mx}px, ${my}px)`;
    });
    (function anim() {
      rx += (mx - rx) * 0.1;
      ry += (my - ry) * 0.1;
      ring.style.transform = `translate(${rx}px, ${ry}px)`;
      requestAnimationFrame(anim);
    })();
    
    document.getElementById('start-btn').addEventListener('mouseenter', () => {
      ring.style.width = '60px';
      ring.style.height = '60px';
    });
    document.getElementById('start-btn').addEventListener('mouseleave', () => {
      ring.style.width = '38px';
      ring.style.height = '38px';
    });
  </script>
</body>
</html>
