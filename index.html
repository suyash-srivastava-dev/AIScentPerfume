<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alter Intelligence — Scent Journey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet">

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <style>
    :root {
      --bg: #f0ece4;
      --text: #1a1a18;
      --muted: #6b6860;
      --accent: #c9a84c;
      --border: rgba(0, 0, 0, 0.10);
      --font-mono: 'Space Mono', monospace;
      --font-serif: 'Cormorant Garamond', serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      font-family: var(--font-mono);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ── L'Oréal Brandstorm Badge (top-center absolute) ── */
    .brandstorm-badge {
      position: absolute;
      top: 44px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 20;
      user-select: none;
      white-space: nowrap;
    }

    .bs-sup {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      letter-spacing: 0.28em;
      color: var(--muted);
      display: block;
      margin-bottom: 4px;
    }

    .bs-main {
      font-family: var(--font-serif);
      font-size: 1.8rem;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      line-height: 1;
      display: block;
    }

    .bs-year {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1.4rem;
      font-weight: 300;
      color: var(--accent);
      display: block;
      margin-top: 2px;
    }

    /* ── Main layout ── */
    .landing-layout {
      display: flex;
      align-items: center;
      width: 100%;
      height: 100%;
      max-width: 1440px;
    }

    /* ── 3D Canvas ── */
    .canvas-col {
      flex: 1.15;
      height: 100%;
      position: relative;
    }

    #bottle-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── Text ── */
    .text-col {
      flex: 1;
      padding: 0 6% 0 2%;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .eyebrow {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 22px;
    }

    h1.title {
      font-family: var(--font-serif);
      font-size: clamp(3rem, 5vw, 5.5rem);
      font-weight: 300;
      line-height: 1.0;
      letter-spacing: 0.02em;
      margin-bottom: 26px;
    }

    .subtitle {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      color: var(--muted);
      margin-bottom: 60px;
      text-transform: uppercase;
      line-height: 1.8;
      max-width: 26ch;
    }

    .btn-start {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 16px 44px;
      font-family: var(--font-mono);
      font-size: 0.67rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.35s ease, color 0.35s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 14px;
    }

    .btn-start:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-start svg {
      width: 12px;
      height: 12px;
      transition: transform 0.3s ease;
    }

    .btn-start:hover svg {
      transform: translateX(5px);
    }

    /* grain texture */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.035;
      pointer-events: none;
      z-index: 998;
    }

    @media(max-width:900px) {
      .landing-layout {
        flex-direction: column-reverse;
      }

      .canvas-col {
        height: 52vh;
      }

      .text-col {
        align-items: center;
        text-align: center;
        padding: 20px;
      }
    }

    /* ── Hidden view toggle ── */
    .view-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
      /* Hidden until hovered */
      opacity: 0;
      transition: opacity 0.3s ease;
      background: rgba(240, 236, 228, 0.6);
      border: 1px solid var(--border);
      padding: 6px 12px;
      font-family: var(--font-mono);
      font-size: 0.5rem;
      letter-spacing: 0.18em;
      color: var(--muted);
      cursor: pointer;
      text-transform: uppercase;
      backdrop-filter: blur(6px);
    }

    .view-toggle:hover {
      opacity: 1 !important;
      color: var(--accent);
      border-color: var(--accent);
    }

    body:hover .view-toggle {
      opacity: 0.25;
    }

    /* ── Static bottle image ── */
    .bottle-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      mix-blend-mode: multiply;
      mask-image: linear-gradient(to right, rgba(0, 0, 0, 1) 78%, rgba(0, 0, 0, 0) 100%);
      -webkit-mask-image: linear-gradient(to right, rgba(0, 0, 0, 1) 78%, rgba(0, 0, 0, 0) 100%);
      display: none;
      /* hidden by default — 3D is default */
    }
  </style>
</head>

<body>

  <!-- Hidden view toggle (top-right, reveals on hover) -->
  <button class="view-toggle" id="view-toggle" title="Toggle 3D / Image">3D ⇄ IMG</button>

  <!-- L'Oréal Brandstorm badge -->
  <div class="brandstorm-badge">
    <span class="bs-sup">L'Oréal</span>
    <span class="bs-main">Brandstorm</span>
    <span class="bs-year">2026</span>
  </div>

  <div class="landing-layout">

    <!-- Three.js Glass Bottle + static image (toggled) -->
    <div class="canvas-col">
      <canvas id="bottle-canvas"></canvas>
      <img id="bottle-img" src="assets/landing_page/Gemini_Generated_Image_q1v8lbq1v8lbq1v8-removebg-preview.png"
        class="bottle-img" alt="Alter Intelligence Signature Scent" style="position:absolute;top:0;left:0;">
    </div>

    <!-- Brand text -->
    <div class="text-col">
      <div class="eyebrow">Alter Intelligence &mdash; Scent DNA System</div>
      <h1 class="title">Alter<br>Intelligence</h1>
      <p class="subtitle">Discover your olfactory identity through AI-guided fragrance profiling</p>
      <a href="preferences.html" class="btn-start">
        Begin Consultation
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M5 12h14M12 5l7 7-7 7" />
        </svg>
      </a>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
    import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';

    /* ──────────────── Renderer ──────────────── */
    const canvas = document.getElementById('bottle-canvas');
    const col = canvas.parentElement;

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(col.clientWidth, col.clientHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    // Match the ivory CSS background — required for glass transmission to work
    renderer.setClearColor(0xf0ece4, 1);

    /* ──────────────── Scene & Camera ──────────────── */
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf0ece4);

    const camera = new THREE.PerspectiveCamera(38, col.clientWidth / col.clientHeight, 0.1, 100);
    camera.position.set(0.3, 0.3, 6.5);

    /* ──────────────── Environment (critical for glass refraction) ──────────────── */
    const pmrem = new THREE.PMREMGenerator(renderer);
    pmrem.compileEquirectangularShader();
    scene.environment = pmrem.fromScene(new RoomEnvironment()).texture;

    /* ──────────────── Lights ──────────────── */
    // Warm ambient to match ivory background
    scene.add(new THREE.AmbientLight(0xf8f0e0, 0.8));

    // Strong white key light (upper-right front)
    const keyLight = new THREE.DirectionalLight(0xffffff, 4.0);
    keyLight.position.set(4, 8, 6);
    scene.add(keyLight);

    // Blue-tinted fill (enhances the cobalt glass colour)
    const fillLight = new THREE.PointLight(0x3355ff, 8, 20);
    fillLight.position.set(-4, 2, 3);
    scene.add(fillLight);

    // Sharp rim light from behind-left to outline the glass edges
    const rimLight = new THREE.DirectionalLight(0xffffff, 2.0);
    rimLight.position.set(-5, 4, -4);
    scene.add(rimLight);

    // Warm floor bounce (mimics real product photography)
    const bounceLight = new THREE.PointLight(0xffe4a0, 3, 10);
    bounceLight.position.set(0, -4, 3);
    scene.add(bounceLight);

    /* ──────────────── Materials ──────────────── */

    // ① Cobalt blue glass body — MeshPhysicalMaterial with full transmission
    const glassMat = new THREE.MeshPhysicalMaterial({
      color: new THREE.Color(0x0a2a6a),  // Deep cobalt blue
      metalness: 0.05,
      roughness: 0.04,
      transmission: 1.0,          // Full glass
      thickness: 2.0,             // Thick walls = stronger refraction
      ior: 1.52,                  // Standard glass IOR
      clearcoat: 1.0,
      clearcoatRoughness: 0.05,
      transparent: true,
      envMapIntensity: 2.0,
    });

    // ② Brushed silver neck collar
    const silverMat = new THREE.MeshStandardMaterial({
      color: 0xd0d0d8,
      metalness: 1.0,
      roughness: 0.2,
    });

    // ③ Crystal-clear cap (matching reference image — slightly white/frosted)
    const capMat = new THREE.MeshPhysicalMaterial({
      color: 0xdde8ff,  // Very pale blue-white tint
      metalness: 0.05,
      roughness: 0.08,
      transmission: 0.85,
      thickness: 1.2,
      ior: 1.48,
      clearcoat: 1.0,
      clearcoatRoughness: 0.02,
      transparent: true,
      envMapIntensity: 1.5,
    });

    /* ──────────────── Bottle Assembly ──────────────── */
    const group = new THREE.Group();

    // Main body — RoundedBox matching the reference shape
    const bodyGeo = new RoundedBoxGeometry(1.65, 2.4, 1.05, 10, 0.14);
    const body = new THREE.Mesh(bodyGeo, glassMat);
    group.add(body);

    // Neck connector (silver band)
    const neckGeo = new THREE.CylinderGeometry(0.24, 0.28, 0.32, 32);
    const neck = new THREE.Mesh(neckGeo, silverMat);
    neck.position.y = 1.36;
    group.add(neck);

    // The cap — RoundedBox (squarer, slightly overhanging like in image)
    const capGeo = new RoundedBoxGeometry(0.90, 0.75, 0.90, 8, 0.10);
    const cap = new THREE.Mesh(capGeo, capMat);
    cap.position.y = 1.90;
    group.add(cap);

    /* ──────────────── YSL Branding Decal ──────────────── */
    // Draw the YSL monogram + wordmark onto an offscreen Canvas
    const brandCanvas = document.createElement('canvas');
    brandCanvas.width = 512;
    brandCanvas.height = 512;
    const ctx = brandCanvas.getContext('2d');

    // Clear — transparent background
    ctx.clearRect(0, 0, 512, 512);

    const gold = '#c9a84c';

    // ── YSL Monogram (hand-drawn via canvas paths) ──────
    // Drawn in a 160×160 area, centred at (256, 190)
    ctx.save();
    ctx.translate(256, 190);
    ctx.fillStyle = gold;
    ctx.strokeStyle = gold;
    ctx.lineWidth = 8;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // Y — two diagonal strokes down to centre, then vertical
    ctx.beginPath();
    ctx.moveTo(-52, -70); ctx.lineTo(0, -10);   // left arm
    ctx.moveTo(52, -70); ctx.lineTo(0, -10);   // right arm
    ctx.moveTo(0, -10); ctx.lineTo(0, 40);    // stem down
    ctx.stroke();

    // S — a bold curved S overlapping the YL
    ctx.beginPath();
    // top arc
    ctx.moveTo(28, -10);
    ctx.bezierCurveTo(28, -50, -28, -50, -28, -10);
    // bottom arc
    ctx.bezierCurveTo(-28, 30, 28, 30, 28, 70);
    ctx.lineWidth = 9;
    ctx.stroke();

    // L — horizontal base and vertical stroke
    ctx.beginPath();
    ctx.moveTo(-10, -10); ctx.lineTo(-10, 70);    // vertical
    ctx.moveTo(-10, 70); ctx.lineTo(48, 70);    // horizontal foot
    ctx.lineWidth = 8;
    ctx.stroke();

    ctx.restore();

    // ── "YVES SAINT LAURENT" wordmark ──────────────────
    ctx.fillStyle = gold;
    ctx.font = 'italic 600 22px "Times New Roman", serif';
    ctx.letterSpacing = '3px';
    ctx.textAlign = 'center';
    ctx.fillText('YVES SAINT LAURENT', 256, 340);




    // ── Thin rule lines above and below wordmark ────────
    ctx.strokeStyle = gold;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(80, 320); ctx.lineTo(432, 320); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(80, 355); ctx.lineTo(432, 355); ctx.stroke();

    // Apply as a texture to a transparent plane
    const brandTex = new THREE.CanvasTexture(brandCanvas);
    const brandMat = new THREE.MeshBasicMaterial({
      map: brandTex,
      transparent: true,
      depthWrite: false,
      opacity: 0.88,
    });
    // Plane sized to fit nicely on the bottle front face
    const brandPlane = new THREE.Mesh(
      new THREE.PlaneGeometry(1.3, 1.3),
      brandMat
    );
    // Position just in front of the glass body front face (z = half depth + tiny gap)
    brandPlane.position.set(0, -0.1, 0.534);
    group.add(brandPlane);

    scene.add(group);

    // Initial pose (slight 3/4 angle like the reference)
    group.rotation.y = 0.35;
    group.rotation.x = 0.05;

    /* ──────────────── Mouse Interaction ──────────────── */
    let targetRotY = 0.35;
    let targetRotX = 0.05;

    document.addEventListener('mousemove', (e) => {
      // Only track mouse in the left half of the screen (canvas area)
      const nx = (e.clientX / window.innerWidth) * 2 - 1;
      const ny = (e.clientY / window.innerHeight) * 2 - 1;
      targetRotY = 0.35 + nx * 0.35;
      targetRotX = 0.05 - ny * 0.12;
    });

    /* ──────────────── Render Loop ──────────────── */
    (function animate() {
      requestAnimationFrame(animate);

      // Smooth follow
      group.rotation.y += (targetRotY - group.rotation.y) * 0.06;
      group.rotation.x += (targetRotX - group.rotation.x) * 0.06;

      // Elegant float
      group.position.y = Math.sin(Date.now() * 0.0008) * 0.065;

      renderer.render(scene, camera);
    })();

    /* ──────────────── Resize ──────────────── */
    window.addEventListener('resize', () => {
      const w = col.clientWidth, h = col.clientHeight;
      renderer.setSize(w, h);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    });
  </script>

  <!-- Toggle: 3D ⇄ Image (runs independently of the module) -->
  <script>
    (function () {
      const btn = document.getElementById('view-toggle');
      const canvasEl = document.getElementById('bottle-canvas');
      const imgEl = document.getElementById('bottle-img');
      let showing3d = true;

      // Apply defaults on load
      canvasEl.style.display = 'block';
      imgEl.style.display = 'none';
      btn.textContent = '3D ⇄ IMG';

      btn.addEventListener('click', () => {
        showing3d = !showing3d;
        if (showing3d) {
          canvasEl.style.display = 'block';
          imgEl.style.display = 'none';
          btn.textContent = '3D ⇄ IMG';
        } else {
          canvasEl.style.display = 'none';
          imgEl.style.display = 'block';
          btn.textContent = 'IMG ⇄ 3D';
        }
      });
    })();
  </script>

</body>

</html>
